<style>
:root{
  --bg:#0b0b0b; --card:#141414; --ink:#f3f3f3; --muted:#9a9a9a;
  --accent:#ff4d4d; --good:#34d399; --line:#262626;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font:16px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}
.app{
  position:relative;
  min-height:100%; min-height:100dvh;
  display:flex; flex-direction:column;
  padding:max(env(safe-area-inset-top),16px) 16px max(env(safe-area-inset-bottom),16px);
  max-width:560px; margin:0 auto;
}
h1{font-size:22px; margin:0 0 4px; letter-spacing:-.01em}
h2{font-size:18px; margin:0 0 8px}
p{margin:0 0 12px; color:var(--muted)}
.row{display:flex; gap:8px}
.row > *{flex:1}
button{
  font:inherit; color:var(--ink); background:var(--card);
  border:1px solid var(--line); border-radius:12px; padding:14px 12px;
  cursor:pointer; transition:transform .08s ease, background .15s ease;
  -webkit-user-select:none; user-select:none;
}
button:active{transform:scale(.98)}
button.primary{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600}
button.ghost{background:transparent}
input,select{
  font:inherit; width:100%; color:var(--ink); background:#1c1c1c;
  border:1px solid var(--line); border-radius:12px; padding:14px 12px;
}
input:focus,select:focus,button:focus{outline:2px solid var(--accent); outline-offset:2px}
label{font-size:13px; color:var(--muted); display:block; margin:12px 0 6px}
.card{
  background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:16px; margin-bottom:12px;
}
.pill{
  display:inline-block; padding:4px 10px; border-radius:999px;
  background:#1c1c1c; border:1px solid var(--line); font-size:12px; color:var(--muted);
  margin-right:6px; margin-top:4px;
}
.tabs{display:flex; gap:6px; margin-bottom:12px}
.tabs button{flex:1; padding:10px; font-size:14px}
.tabs button.active{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600}
.list{display:flex; flex-direction:column; gap:6px; max-height:42vh; overflow:auto; padding-right:4px}
.list .item{
  display:flex; align-items:center; gap:8px; padding:10px 12px;
  background:#1c1c1c; border:1px solid var(--line); border-radius:10px;
}
.list .item .name{flex:1}
.list .item .x{
  border:none; background:transparent; color:var(--muted);
  font-size:18px; padding:4px 8px;
}
.list .item .x:active{color:var(--accent)}
.huge{
  font-size:42px; font-weight:700; letter-spacing:-.02em; text-align:center;
  margin:8px 0 4px;
}
.center{text-align:center}
.secret{
  font-size:28px; font-weight:700; text-align:center; letter-spacing:.02em;
  padding:28px 12px; background:#1c1c1c; border:1px dashed var(--line);
  border-radius:14px; margin:14px 0;
}
.secret.imposter{color:var(--accent); border-color:var(--accent)}
.muted{color:var(--muted)}
.small{font-size:12px}
.hr{height:1px; background:var(--line); margin:12px 0; border:0}
.kbd{font-family:ui-monospace,Menlo,monospace; font-size:12px; color:var(--muted)}
.tag-row{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px}
.tag{
  font-size:12px; padding:6px 10px; border-radius:999px;
  background:#1c1c1c; border:1px solid var(--line); color:var(--muted);
  cursor:pointer;
}
.tag.on{background:var(--accent); border-color:var(--accent); color:#fff}
.reveal-screen{min-height:60vh; display:flex; flex-direction:column; justify-content:center}
.hand{font-size:80px; text-align:center; margin:8px 0}
.starter-reveal{
  position:relative; border-radius:20px; padding:28px 18px;
  color:#fff; text-align:center;
  background:linear-gradient(135deg,#ff4d4d 0%,#ff8a3d 25%,#ffd23f 50%,#34d399 75%,#4f9bff 100%);
  background-size:200% 200%;
  animation:holdShift 12s ease infinite;
  box-shadow:0 12px 36px rgba(255,77,77,.3),0 4px 12px rgba(0,0,0,.35);
  cursor:pointer; -webkit-user-select:none; user-select:none;
  -webkit-touch-callout:none; touch-action:manipulation;
  min-height:160px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  transition:transform .12s ease, box-shadow .12s ease, min-height .25s ease;
  margin:18px 0 4px;
}
.starter-reveal:active{transform:scale(.99)}
.starter-reveal.locked{
  background:linear-gradient(135deg,#34d399 0%,#4f9bff 100%);
  animation:none;
  box-shadow:0 12px 36px rgba(52,211,153,.4),0 4px 12px rgba(0,0,0,.35);
  min-height:200px;
}
.starter-scramble{
  font-size:18px; font-weight:600; letter-spacing:.04em;
  text-shadow:0 2px 8px rgba(0,0,0,.4);
  font-variant-numeric:tabular-nums;
}
.starter-name{
  font-size:42px; font-weight:800; letter-spacing:-.02em; line-height:1.05;
  text-shadow:0 4px 18px rgba(0,0,0,.5);
  animation:starterPop .35s cubic-bezier(.5,1.7,.4,1) both;
}
@keyframes starterPop{
  0%{transform:scale(.7); opacity:0}
  100%{transform:scale(1); opacity:1}
}
.starter-foot{font-size:13px; opacity:.92}
.ready-btn{
  opacity:0; max-height:0; padding-top:0; padding-bottom:0; margin-top:0;
  pointer-events:none; overflow:hidden;
  transition:opacity .25s ease, max-height .25s ease, padding .25s ease, margin .25s ease;
}
.ready-btn.visible{
  opacity:1; max-height:80px; padding-top:14px; padding-bottom:14px; margin-top:14px;
  pointer-events:auto;
}
.hold-card{
  position:relative; border-radius:24px; padding:36px 24px;
  color:#fff; text-align:center;
  background:linear-gradient(135deg,#ff4d4d 0%,#ff8a3d 20%,#ffd23f 40%,#34d399 60%,#4f9bff 80%,#b14dff 100%);
  background-size:220% 220%;
  animation:holdShift 14s ease infinite;
  box-shadow:0 16px 48px rgba(255,77,77,.3),0 4px 12px rgba(0,0,0,.35);
  -webkit-user-select:none; user-select:none;
  -webkit-touch-callout:none;
  touch-action:none; cursor:pointer;
  min-height:56vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  transition:transform .12s ease, box-shadow .12s ease;
}
.hold-card.holding{
  transform:scale(1.015);
  box-shadow:0 24px 60px rgba(255,138,61,.45),0 8px 24px rgba(0,0,0,.45);
}
@keyframes holdShift{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}
.hold-card .name{
  font-size:30px; font-weight:700; letter-spacing:-.02em;
  text-shadow:0 2px 12px rgba(0,0,0,.35);
}
.hold-card .reveal-content{
  opacity:0; transform:translateY(8px);
  transition:opacity .15s ease, transform .15s ease;
  min-height:96px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  pointer-events:none;
}
.hold-card.holding .reveal-content{
  opacity:1; transform:translateY(0);
}
.hold-card .word{
  font-size:42px; font-weight:800; letter-spacing:-.02em; line-height:1.1;
  text-shadow:0 4px 16px rgba(0,0,0,.45);
  word-break:break-word; max-width:100%;
}
.hold-card .imp-headline{
  font-size:46px; font-weight:900; letter-spacing:.06em; text-transform:uppercase;
  background:linear-gradient(180deg,#fff 0%,#ffe5b4 100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:transparent;
  text-shadow:0 4px 24px rgba(0,0,0,.45), 0 0 32px rgba(255,77,77,.55);
  line-height:1; padding:2px 0 6px;
  animation:impPulse 2.6s ease-in-out infinite;
}
@keyframes impPulse{
  0%,100%{ filter:drop-shadow(0 0 0 rgba(255,77,77,0)); }
  50%{ filter:drop-shadow(0 0 18px rgba(255,77,77,.55)); }
}
.hold-card .imp-tag{
  display:inline-block; background:rgba(0,0,0,.45); color:#fff;
  padding:6px 16px; border-radius:999px;
  font-size:11px; font-weight:700; letter-spacing:.2em; text-transform:uppercase;
  border:1px solid rgba(255,255,255,.35);
}
.hold-card .imp-topic{
  font-size:22px; font-weight:700; text-shadow:0 2px 8px rgba(0,0,0,.35);
}
.hold-card .imp-samples{
  font-size:18px; font-weight:600; opacity:.95; text-shadow:0 1px 4px rgba(0,0,0,.3);
  text-align:center;
}
.hold-card .hint{
  font-size:12px; text-transform:uppercase; letter-spacing:.14em; font-weight:700;
  padding:8px 18px; border-radius:999px; background:rgba(0,0,0,.22);
  display:inline-flex; align-items:center; gap:8px;
}
.hold-card .hint::before{
  content:''; width:8px; height:8px; border-radius:50%; background:#fff;
  box-shadow:0 0 0 0 rgba(255,255,255,.7);
  animation:pulseDot 1.6s ease-in-out infinite;
}
.hold-card.holding .hint::before{
  animation:none; opacity:.55;
}
@keyframes pulseDot{
  0%{box-shadow:0 0 0 0 rgba(255,255,255,.65)}
  70%{box-shadow:0 0 0 12px rgba(255,255,255,0)}
  100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}

.bottom-actions{margin-top:auto; display:flex; flex-direction:column; gap:8px}
.advance-btn{
  width:100%; padding:16px 12px; border-radius:14px; border:0;
  background:#fff; color:#0b0b0b; font-weight:700; font-size:16px;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
  transition:transform .08s ease, opacity .2s ease, max-height .25s ease, margin .25s ease, padding .25s ease;
  opacity:0; max-height:0; padding-top:0; padding-bottom:0; margin-top:0;
  overflow:hidden; pointer-events:none;
}
.advance-btn.visible{
  opacity:1; max-height:80px; padding-top:16px; padding-bottom:16px; margin-top:14px;
  pointer-events:auto;
}
.advance-btn:active{transform:scale(.98)}
.help-btn{
  position:absolute; top:max(env(safe-area-inset-top),12px); right:16px;
  width:36px; height:36px; border-radius:50%;
  background:#1c1c1c; border:1px solid var(--line); color:var(--ink);
  font-weight:700; font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.help-btn:active{background:var(--accent); border-color:var(--accent); color:#fff}
.modal-backdrop{
  position:fixed; inset:0; background:rgba(0,0,0,.7);
  display:flex; align-items:center; justify-content:center;
  padding:16px; z-index:50;
}
.modal{
  background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:20px; max-width:480px; width:100%;
  max-height:80vh; overflow:auto;
}
.modal h2{margin-top:0}
.modal ol, .modal ul{padding-left:20px; color:var(--muted)}
.modal li{margin-bottom:8px}
.modal .close{display:block; width:100%; margin-top:12px}
.toggle{display:flex; align-items:center; justify-content:space-between; padding:10px 0}
.toggle input{width:auto}
.spacer{height:8px}
.note{font-size:12px; color:var(--muted); text-align:center; margin-top:6px}
</style>

/* ---------- Persistence ---------- */
function save(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); }catch{}
}
function load(){
  try{
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    Object.assign(STATE, s);
  }catch{}
}

/* ---------- Helpers ---------- */
function $(sel, root=document){ return root.querySelector(sel); }
function el(tag, attrs={}, children=[]){
  const e = document.createElement(tag);
  for(const k in attrs){
    if(k==='class') e.className = attrs[k];
    else if(k==='style') e.style.cssText = attrs[k];
    else if(k.startsWith('on') && typeof attrs[k]==='function') e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if(attrs[k]===true) e.setAttribute(k,'');
    else if(attrs[k]!==false && attrs[k]!=null) e.setAttribute(k, attrs[k]);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null||c===false) return;
    if(typeof c==='string'||typeof c==='number') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function pluralize(n,word){ return n===1 ? word : word+'s'; }
// Return flat list of all words in the current pack.
function chosenPack(){
  if(STATE.category === 'random'){
    const keys = Object.keys(PACKS).filter(k=>k!=='random');
    const merged = [];
    keys.forEach(k=> PACKS[k].forEach(g => merged.push(...g.words)));
    return merged;
  }
  if(STATE.category === 'custom'){
    return STATE.customCategory.split(',').map(s=>s.trim()).filter(Boolean);
  }
  const groups = PACKS[STATE.category];
  if(!groups) return [];
  const merged = [];
  groups.forEach(g => merged.push(...g.words));
  return merged;
}
// Find the sub-group {theme, words} containing the secret word.
// Random category searches across all packs. Returns null if not found.
function findSecretGroup(){
  const w = (STATE.word||'').toLowerCase();
  if(!w) return null;
  let packs;
  if(STATE.category === 'random'){
    packs = Object.keys(PACKS).filter(k=>k!=='random').map(k=>PACKS[k]);
  } else if(STATE.category === 'custom'){
    // Custom has no sub-groups; pretend the whole list is one group
    const words = STATE.customCategory.split(',').map(s=>s.trim()).filter(Boolean);
    if(words.some(x => x.toLowerCase() === w)) return { theme:'Custom List', words };
    return null;
  } else {
    packs = [PACKS[STATE.category] || []];
  }
  for(const groups of packs){
    for(const g of groups){
      if(g.words.some(x => x.toLowerCase() === w)) return g;
    }
  }
  return null;
}
// Build the imposter hint from the secret's sub-group.
function makeHint(){
  const group = findSecretGroup();
  if(!group){
    return { label:'Mixed', samples: [] };
  }
  const w = (STATE.word||'').toLowerCase();
  const candidates = group.words.filter(x => x.toLowerCase() !== w);
  const samples = shuffle(candidates).slice(0, 3);
  return { label: group.theme, samples };
}

function startGame(){
  if(STATE.players.length < 2){ alert('Need at least 2 players.'); return; }
  const pack = chosenPack();
  if(pack.length < 2){ alert('Pick a category with at least 2 words.'); return; }
  // pick word
  let w = pick(pack);
  while(STATE.history.length && STATE.history[STATE.history.length-1].word === w && pack.length>1){
    w = pick(pack); // avoid same word twice in a row
  }
  STATE.word = w;
  // assign imposter indices
  const indices = shuffle(STATE.players.map((_,i)=>i)).slice(0, STATE.imposters);
  STATE._imposters = indices;
  STATE.turnIndex = 0;
  STATE.screen = 'reveal';
  save();
  render();
}

function renderReveal(){
  const app = $('#app'); app.innerHTML='';
  const total = STATE.players.length;
  const i = STATE.turnIndex;
  const name = STATE.players[i];

  // Help button — always reachable from every screen.
  app.appendChild(el('button',{class:'help-btn', title:'How to play', 'aria-label':'How to play', onClick:showHelp},['?']));

  app.appendChild(el('p',{class:'small muted center'},['Player '+(i+1)+' of '+total+' — '+name]));

  const card = el('div',{class:'hold-card', 'data-role':'hold-card'},[
    el('div',{class:'name'},[name]),
    el('div',{class:'reveal-content'},[
      // Filled in once we render the secret below
    ]),
    el('div',{class:'hint'},['Hold to reveal']),
  ]);
  app.appendChild(card);

  // Decide what gets revealed when the player presses & holds the card.
  const isImp = STATE._imposters.includes(i);
  const revealSlot = card.querySelector('.reveal-content');
  if(isImp){
    const hint = makeHint();
    revealSlot.appendChild(el('div',{class:'imp-headline'},['Imposter']));
    revealSlot.appendChild(el('div',{class:'imp-tag'},['Your cover story']));
    revealSlot.appendChild(el('div',{class:'imp-topic'},[hint.label]));
    revealSlot.appendChild(el('div',{class:'imp-samples'},[hint.samples.join('  ·  ')]));
  } else {
    revealSlot.appendChild(el('div',{class:'imp-tag'},['Your secret word']));
    revealSlot.appendChild(el('div',{class:'word'},[STATE.word]));
  }

  // Pointer / touch / mouse handlers — reveal while held, hide on release.
  // Release only hides. A dedicated "Next player" button (revealed after
  // the first tap) is what advances the turn — this way a player can
  // re-check the card without accidentally advancing.
  const isLast = i >= STATE.players.length - 1;

  // Next-player button: hidden until the card has been pressed at least once.
  const advance = el('button',{class:'advance-btn', 'aria-hidden':'true'},[
    isLast ? 'I’ve seen it — cover & continue' : 'I’ve seen it — next player',
  ]);
  function show(){
    card.classList.add('holding');
    advance.classList.add('visible');
    advance.setAttribute('aria-hidden','false');
  }
  function hide(){
    card.classList.remove('holding');
  }
  function advanceTurn(){
    if(isLast){
      STATE.history.push({
        word: STATE.word,
        imposter: STATE._imposters.map(idx => STATE.players[idx]),
        players: STATE.players.slice(),
      });
      save();
      renderCoverThenPlay();
    } else {
      STATE.turnIndex++;
      render();
    }
  }
  advance.addEventListener('click', advanceTurn);

  // Touch (mobile — the primary case for "screen touch")
  card.addEventListener('touchstart', e=>{ e.preventDefault(); show(); }, {passive:false});
  card.addEventListener('touchend',   e=>{ e.preventDefault(); hide(); }, {passive:false});
  card.addEventListener('touchcancel', e=>{ e.preventDefault(); hide(); }, {passive:false});

  // Mouse (desktop preview / keyboard a11y)
  card.addEventListener('mousedown', e=>{ e.preventDefault(); show(); });
  card.addEventListener('mouseup',   e=>{ e.preventDefault(); hide(); });
  card.addEventListener('mouseleave',e=>{ hide(); });

  card.setAttribute('tabindex','0');
  card.setAttribute('role','button');
  card.setAttribute('aria-label','Hold to reveal your role');
  card.addEventListener('keydown', e=>{
    if(e.key===' '||e.key==='Enter'){ e.preventDefault(); show(); }
  });
  card.addEventListener('keyup', e=>{
    if(e.key===' '||e.key==='Enter'){ e.preventDefault(); hide(); }
  });

  const back = el('button',{class:'ghost', onClick:()=>{
    if(confirm('Abandon this round?')){ STATE.screen='setup'; render(); }
  }},['Abandon round']);
  app.appendChild(advance);
  app.appendChild(el('div',{class:'bottom-actions'},[back]));
}

function revealWord(){
  // Legacy entry point — renderReveal now builds the hold-to-reveal card
  // directly, so this is kept only as a safety net for stale callers.
  renderReveal();
}

// Shown after the last player hides their role. Forces them to put the
// phone face-down, then scrambles and picks a random starter.
// Imposters always go LAST — they need to hear a clue or two first
// so they can fake it. This gate picks the starter from the
// non-imposter pool; if somehow every player is an imposter (only
// possible with edge-case settings) we fall back to a random name.
function pickStarter(){
  const pool = STATE.players
    .map((name,i)=>({name, i}))
    .filter(p => !STATE._imposters.includes(p.i));
  const list = pool.length ? pool : STATE.players.map((name,i)=>({name,i}));
  // Fisher–Yates shuffle, take the first
  for(let i=list.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [list[i],list[j]] = [list[j],list[i]];
  }
  return list[0];
}

function renderCoverThenPlay(){
  const app = $('#app'); app.innerHTML='';
  STATE._startPlayer = pickStarter();

  const starterName = STATE.players[STATE._startPlayer.i];

  // The big "starter" reveal — scrambles through names then locks.
  // Default state: shows a "Tap to pick who starts" prompt. Only after
  // the scramble lands does the "open the round" button appear, so a
  // face-down host never hits the ready button before naming a starter.
  const starterEl = el('div',{class:'starter-reveal', role:'button', tabindex:'0', 'aria-label':'Reveal who starts'},[
    el('div',{class:'starter-scramble', 'aria-live':'polite'},['Tap to pick who starts']),
    el('div',{class:'starter-name', style:'display:none'},[starterName]),
    el('div',{class:'starter-foot small muted', style:'display:none'},['🎤 Starts the discussion']),
  ]);
  const readyBtn = el('button',{class:'primary ready-btn', onClick:()=>{ STATE.screen='play'; render(); }},[
    'I\'ve got it — open the round',
  ]);

  app.appendChild(el('div',{class:'reveal-screen'},[
    el('div',{class:'hand'},['📵']),
    el('h2',{class:'center'},['Cover the phone']),
    el('p',{class:'center muted'},['Pass it to whoever\'s going to tap next. Everyone else look away.']),
    starterEl,
    readyBtn,
  ]));

  // Wire the scramble-on-tap behaviour.
  let locked = false;
  const scrambleEl = starterEl.querySelector('.starter-scramble');

  function startScramble(){
    if(locked) return;
    locked = true;
    starterEl.setAttribute('aria-pressed','true');

    // Animated scramble of every player name + decorative words so
    // someone glancing sideways can't read the final answer before
    // it stops. Stops on the picked starter.
    const blurbs = [...new Set([
      ...STATE.players,
      'Tap reveal', 'All eyes 👀', 'Drama club',
      'Secret word', 'Bluff master', 'Not it',
      'Spy vibes',  'Cover story',
    ])];
    const stops = 24;          // total number of flicker frames
    const interval = 45;       // ms between frames
    let n = 0;

    const tick = setInterval(()=>{
      const idx = Math.floor(Math.random()*blurbs.length);
      scrambleEl.textContent = blurbs[idx];
      n++;
      if(n >= stops){
        clearInterval(tick);
        starterEl.classList.add('locked');
        // Swap to the locked-in name and reveal the ready button.
        if(scrambleEl) scrambleEl.style.display = 'none';
        const nameEl = starterEl.querySelector('.starter-name');
        const footEl = starterEl.querySelector('.starter-foot');
        if(nameEl)   nameEl.style.display   = '';
        if(footEl)   footEl.style.display   = '';
        readyBtn.classList.add('visible');
        try { readyBtn.focus(); } catch(_){}
      }
    }, interval);
  }

  starterEl.addEventListener('click', startScramble);
  starterEl.addEventListener('keydown', e=>{
    if(e.key===' '||e.key==='Enter'){ e.preventDefault(); startScramble(); }
  });
}

  const reveal = el('button',{class:'primary', onClick:()=>{
    // Reveal both pieces in place
    const wc = document.getElementById('word-cover');
    const ic = document.getElementById('imp-cover');
    if(wc){ wc.textContent = STATE.word; wc.style.color = 'var(--ink)'; }
    if(ic){
      ic.innerHTML = '';
      STATE._imposters.forEach(idx => ic.appendChild(el('span',{class:'tag on'},[STATE.players[idx]])));
    }
    reveal.disabled = true;
    reveal.textContent = 'Revealed';
    reveal.style.opacity = '.5';
  }},['Reveal word & imposter']);
  const newRound = el('button',{class:'ghost', onClick:()=>{ STATE.screen='setup'; render(); }},['New round']);
  app.appendChild(el('div',{class:'row'},[reveal, newRound]));
  app.appendChild(el('p',{class:'small muted', style:'text-align:center; margin-top:8px'},['Only the host should tap "Reveal" — keep the phone face-down until then.']));
}

function renderEnd(){
  const app = $('#app'); app.innerHTML='';
  app.appendChild(el('h1',{},['Reveal']));
  app.appendChild(el('div',{class:'center', style:'font-size:64px'},['🎭']));
  const imps = STATE._imposters.map(idx => STATE.players[idx]).join(', ');
  app.appendChild(el('h2',{class:'center'},['The imposter'+(STATE._imposters.length>1?'s':'')+' '+imps]));
  app.appendChild(el('div',{class:'card'},[
    el('div',{class:'muted small'},['Secret word']),
    el('div',{class:'huge'},[STATE.word]),
  ]));

  const playAgain = el('button',{class:'primary', onClick:startGame},['Play again (same setup)']);
  const setup = el('button',{class:'ghost', onClick:()=>{ STATE.screen='setup'; render(); }},['Back to setup']);
  const home = el('button',{class:'ghost', onClick:()=>{ STATE.screen='home'; render(); }},['Home']);
  app.appendChild(el('div',{class:'row'},[playAgain, setup]));
  app.appendChild(el('div',{class:'spacer'}));
  app.appendChild(home);
}

function showHelp(){
  closeHelp();
  const backdrop = el('div',{class:'modal-backdrop', id:'help-modal'},[
    el('div',{class:'modal'},[
      el('h2',{},['How to play']),
      el('ol',{},[
        el('li',{},[el('b',{},['Setup']), ' — add 2 or more player names, choose how many imposters, and pick a category of words.']),
        el('li',{},[el('b',{},['Pass & reveal']), ' — hand the phone around. Each player presses and holds their colourful card to secretly see their role, then releases to hide it again.']),
        el('li',{},[el('b',{},['Roles']), ' — most players see the secret word. The imposter(s) see ', el('i',{},['only']), ' a hint about the topic (e.g. "Sitcoms") plus a few example words. Their job is to bluff.']),
        el('li',{},[el('b',{},['Game on']), ' — once everyone has taken their turn, the host covers the phone. Players take turns giving one-word clues (no saying the word itself!) then debate and vote out a suspected imposter.']),
        el('li',{},[el('b',{},['Reveal']), ' — the host taps "Reveal word & imposter" on the play screen to show who the imposter was. Hit "Play again" for another round with the same setup.']),
        el('li',{},[el('b',{},['Tip']), ' — phone screen is your friend: pass confidently, keep it covered between turns, and don\'t peek at someone else\'s card.']),
      ]),
      el('button',{class:'primary close', onClick:closeHelp},['Got it']),
    ]),
  ]);
  backdrop.addEventListener('click', e=>{ if(e.target===backdrop) closeHelp(); });
  document.body.appendChild(backdrop);
}
function closeHelp(){
  const m = document.getElementById('help-modal');
  if(m) m.remove();
}

function showHistory(){
  const app = $('#app'); app.innerHTML='';
  app.appendChild(el('h1',{},['History']));
  if(STATE.history.length===0){
    app.appendChild(el('p',{},['No rounds played yet.']));
  } else {
    STATE.history.slice().reverse().forEach((h,idx)=>{
      app.appendChild(el('div',{class:'card'},[
        el('div',{class:'muted small'},['Round '+(STATE.history.length-idx)]),
        el('div',{class:'huge', style:'font-size:24px; text-align:left'},[h.word]),
        el('div',{class:'tag-row'},[
          ...h.players.map((p,i)=>{
            const wasImp = h.imposter.includes(p);
            return el('span',{class:'tag'+(wasImp?' on':'')},[p+(wasImp?' (imposter)':'')]);
          })
        ]),
      ]));
    });
  }
  const back = el('button',{class:'ghost', onClick:()=>{ STATE.screen='home'; render(); }},['← Back']);
  app.appendChild(back);
}

/* ---------- Router ---------- */
function render(){
  switch(STATE.screen){
    case 'home': renderHome(); break;
    case 'setup': renderSetup(); break;
    case 'reveal': renderReveal(); break;
    case 'play': renderPlay(); break;
    case 'end': renderEnd(); break;
    default: STATE.screen='home'; renderHome();
  }
}

/* ---------- Boot ---------- */
load();
// sanitize persisted state against the current pack keys
if(STATE.category && STATE.category!=='random' && STATE.category!=='custom' && !PACKS[STATE.category]){
  STATE.category = 'random';
}
// migrate players if empty
if(!STATE.players || !STATE.players.length) STATE.players=['Player 1'];
render();

// Prevent accidental horizontal scroll
document.addEventListener('touchmove', e=>{
  if(e.scale && e.scale!==1) e.preventDefault();
},{passive:false});
</script>
</body>
</html>
